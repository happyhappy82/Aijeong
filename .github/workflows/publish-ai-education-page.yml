name: Publish AI education service page

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Publish AI education page to WordPress
        run: node scripts/publish-wp-page.mjs
        env:
          AIJEONG_WP_USER: ${{ secrets.AIJEONG_WP_USER }}
          AIJEONG_WP_APP_PASSWORD: ${{ secrets.AIJEONG_WP_APP_PASSWORD }}
          AIJEONG_WP_BASE_URL: ${{ vars.AIJEONG_WP_BASE_URL || 'https://aijeong.com' }}
          WP_PAGE_FILE: wp-pages/ai-education.html
          WP_PAGE_SLUG: ai-education
          WP_PAGE_TITLE: AI 교육 서비스
          WP_PAGE_EXCERPT: 에이정의 AI 교육 서비스 소개 페이지입니다. 조직 맞춤형 AI 리터러시와 실무 활용 교육을 안내합니다.
          WP_PAGE_STATUS: publish
